<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#030712">
<link rel="manifest" href="manifest.json">
<title>DataMind Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   DESIGN SYSTEM
═══════════════════════════════════════ */
:root{
  --bg:#030712;--s1:#060f1f;--s2:#0a1628;--s3:#0f1e35;--s4:#162545;
  --b:#1a2d47;--b2:#213658;
  --blue:#3b82f6;--bl:#60a5fa;--bd:#1d4ed8;
  --cyan:#22d3ee;--green:#10b981;--amber:#f59e0b;
  --red:#ef4444;--purple:#8b5cf6;--orange:#f97316;
  --pink:#ec4899;--teal:#14b8a6;--lime:#84cc16;
  --indigo:#6366f1;--sky:#0ea5e9;
  --text:#eef2ff;--t2:#94a3b8;--t3:#4b6080;
  --font:'Plus Jakarta Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:12px;--r2:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;-webkit-font-smoothing:antialiased}
body{overflow:hidden}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 15%,rgba(59,130,246,.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 85%,rgba(139,92,246,.05) 0%,transparent 60%),
    linear-gradient(rgba(59,130,246,.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,.018) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,32px 32px,32px 32px;
}
#app{display:flex;flex-direction:column;height:100%;position:relative;z-index:1}

/* TOPBAR */
#topbar{
  background:rgba(6,15,31,.97);border-bottom:1px solid var(--b);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:10px 14px;min-height:52px;
}
.logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--bd),var(--blue));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
#tb-title{flex:1;font-size:.9rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#btn-back{width:32px;height:32px;border-radius:9px;background:var(--s3);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;opacity:0;pointer-events:none}
#btn-back.show{opacity:1;pointer-events:all}
#btn-back svg{width:16px;height:16px;stroke:var(--t2);fill:none;stroke-width:2.2;stroke-linecap:round}
#btn-back:active{transform:scale(.92)}
#lv-pill{padding:2px 8px;border-radius:20px;font-size:.63rem;font-weight:700;font-family:var(--mono);background:rgba(59,130,246,.15);color:var(--bl);white-space:nowrap;flex-shrink:0}
#xp-pill{padding:2px 8px;border-radius:20px;font-size:.63rem;font-weight:700;font-family:var(--mono);background:rgba(16,185,129,.12);color:var(--green);flex-shrink:0}

/* SCREEN */
#screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
#screen::-webkit-scrollbar{display:none}

/* NAV */
#nav{display:flex;background:rgba(6,15,31,.97);border-top:1px solid var(--b);padding:6px 0 max(6px,env(safe-area-inset-bottom));flex-shrink:0;backdrop-filter:blur(20px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;cursor:pointer;border:none;background:none;transition:all .2s;position:relative}
.ni-ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.ni svg{width:19px;height:19px;stroke:var(--t3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.ni span{font-size:9px;color:var(--t3);font-weight:600;letter-spacing:.02em;transition:color .2s}
.ni.on .ni-ic{background:rgba(59,130,246,.15);transform:scale(1.1)}
.ni.on svg{stroke:var(--blue)}
.ni.on span{color:var(--blue)}

/* VIEWS */
.view{display:none;padding:14px 14px 28px;animation:vIn .28s ease}
.view.active{display:block}
@keyframes vIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r);padding:15px;margin-bottom:11px;transition:all .2s}
.card:active{transform:scale(.99)}

/* ACCORDION */
.acc{border:1px solid var(--b);border-radius:var(--r);overflow:hidden;margin-bottom:8px;transition:border-color .2s}
.acc.open{border-color:var(--b2)}
.acc-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;cursor:pointer;background:var(--s2);font-size:.86rem;font-weight:600;transition:background .2s;user-select:none;gap:8px}
.acc-hd:active{background:var(--s3)}
.acc-arr{width:20px;height:20px;border-radius:6px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;font-size:.58rem;color:var(--t3)}
.acc.open .acc-arr{background:rgba(59,130,246,.2);color:var(--blue);transform:rotate(180deg)}
.acc-body{display:none;padding:13px 15px;background:rgba(3,7,18,.5);font-size:.81rem;line-height:1.8;color:var(--t2);border-top:1px solid var(--b)}
.acc.open .acc-body{display:block;animation:aIn .22s ease}
@keyframes aIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

/* CODE */
.cb{background:#020508;border:1px solid var(--b);border-radius:var(--r2);padding:13px;margin:9px 0;font-family:var(--mono);font-size:.74rem;line-height:1.7;overflow-x:auto;white-space:pre;color:#7dd3fc}
.kw{color:#c792ea}.fn{color:#82aaff}.str{color:#c3e88d}.cm{color:#4a5568}.num{color:#f78c6c}

/* INFO BOXES */
.db{border-left:2px solid var(--blue);background:rgba(59,130,246,.06);border-radius:0 var(--r2) var(--r2) 0;padding:10px 13px;margin:9px 0;font-size:.81rem;line-height:1.75}
.db.green{border-color:var(--green);background:rgba(16,185,129,.06)}
.db.amber{border-color:var(--amber);background:rgba(245,158,11,.06)}
.db.purple{border-color:var(--purple);background:rgba(139,92,246,.06)}
.db.teal{border-color:var(--teal);background:rgba(20,184,166,.06)}
.db.red{border-color:var(--red);background:rgba(239,68,68,.06)}
.db strong{color:var(--text)}

/* EXERCISE */
.ex{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:15px;margin:13px 0}
.ex-hd{display:flex;align-items:center;gap:7px;margin-bottom:9px;flex-wrap:wrap}
.badge{padding:2px 8px;border-radius:20px;font-size:.67rem;font-weight:700;font-family:var(--mono)}
.b-easy{background:rgba(16,185,129,.15);color:var(--green)}
.b-med{background:rgba(245,158,11,.15);color:var(--amber)}
.b-hard{background:rgba(239,68,68,.15);color:var(--red)}
.b-exp{background:rgba(139,92,246,.15);color:var(--purple)}
.ex-title{font-size:.87rem;font-weight:700}
.ex-desc{font-size:.8rem;color:var(--t2);line-height:1.7;margin-bottom:11px}
.ex-ed{width:100%;background:#020508;border:1px solid var(--b);border-radius:var(--r2);padding:11px;font-family:var(--mono);font-size:.73rem;color:#7dd3fc;resize:vertical;min-height:95px;outline:none;line-height:1.6;transition:border-color .2s}
.ex-ed:focus{border-color:var(--blue)}
.ex-btns{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:var(--r2);border:none;font-weight:700;font-size:.78rem;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;font-family:var(--font)}
.btn:active{transform:scale(.96)}
.btn-run{background:linear-gradient(135deg,var(--green),#059669);color:#fff}
.btn-hint{background:var(--s3);border:1px solid var(--b);color:var(--t2)}
.btn-clr{background:var(--s3);border:1px solid var(--b);color:var(--t3)}
.ex-out{margin-top:9px;padding:9px 11px;border-radius:var(--r2);font-family:var(--mono);font-size:.72rem;line-height:1.6;display:none;white-space:pre-wrap}
.ex-out.show{display:block;animation:vIn .2s ease}
.out-ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.out-hint{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);color:var(--amber)}
.out-err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:var(--red)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.76rem;border-radius:var(--r);overflow:hidden}
.tbl th{background:var(--s3);padding:8px 10px;text-align:left;color:var(--t2);font-weight:700;font-family:var(--mono);font-size:.68rem;letter-spacing:.05em;border-bottom:1px solid var(--b)}
.tbl td{padding:7px 10px;border-bottom:1px solid rgba(26,45,71,.4);color:var(--t2);vertical-align:top;line-height:1.5}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:rgba(255,255,255,.012)}
.tbl-wrap{border:1px solid var(--b);border-radius:var(--r);overflow:hidden;margin:9px 0}

/* PROGRESS */
.pbar{height:4px;background:var(--s4);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;transition:width .9s cubic-bezier(.4,0,.2,1)}

/* SECTION TAB NAV */
.sec-nav{display:flex;gap:5px;overflow-x:auto;padding-bottom:7px;margin-bottom:14px;scrollbar-width:none}
.sec-nav::-webkit-scrollbar{display:none}
.stab{padding:6px 12px;border-radius:20px;border:1px solid var(--b);background:var(--s2);font-size:.74rem;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .2s;color:var(--t2);font-family:var(--font);flex-shrink:0}
.stab.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* STEPS */
.steps{display:flex;flex-direction:column;gap:11px;margin:10px 0}
.step{display:flex;gap:11px;align-items:flex-start}
.step-n{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--bd),var(--blue));color:#fff;font-size:.7rem;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:2px}
.step-b h4{font-size:.86rem;font-weight:700;margin-bottom:2px}
.step-b p{font-size:.78rem;color:var(--t2);line-height:1.6}

/* LEVEL BADGE */
.lvl{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:.73rem;font-weight:700;margin-bottom:11px}
.lv1{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.lv2{background:rgba(59,130,246,.15);color:var(--bl);border:1px solid rgba(59,130,246,.3)}
.lv3{background:rgba(139,92,246,.15);color:var(--purple);border:1px solid rgba(139,92,246,.3)}
.lv4{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}

/* FORMULA */
.formula{background:#020508;border:1px solid var(--b2);border-radius:var(--r2);padding:9px 13px;margin:7px 0;font-family:var(--mono);font-size:.77rem;color:var(--amber);overflow-x:auto;white-space:pre-line}
.flbl{font-size:.6rem;color:var(--t3);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}

/* HOME */
.hero{padding:20px 0 12px;text-align:center;animation:heroIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes heroIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.hero-logo{width:60px;height:60px;border-radius:17px;margin:0 auto 12px;background:linear-gradient(135deg,var(--bd),var(--blue),#60a5fa);display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 8px 28px rgba(59,130,246,.4);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.hero h1{font-size:1.7rem;font-weight:800;background:linear-gradient(135deg,#f0f4ff 0%,var(--bl) 60%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.hero p{font-size:.8rem;color:var(--t2);margin-top:5px;line-height:1.6}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:14px 0}
.stat-card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r2);padding:11px;text-align:center;animation:sUp .4s ease forwards;opacity:0}
.stat-card:nth-child(1){animation-delay:.1s}.stat-card:nth-child(2){animation-delay:.2s}.stat-card:nth-child(3){animation-delay:.3s}
@keyframes sUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.stat-v{font-size:1.35rem;font-weight:800;line-height:1}
.stat-l{font-size:.65rem;color:var(--t3);margin-top:3px;font-weight:500}
.mods{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin:14px 0}
.mod{background:var(--s1);border:1px solid var(--b);border-radius:var(--r);padding:13px;cursor:pointer;transition:all .22s;animation:sUp .45s ease forwards;opacity:0;position:relative;overflow:hidden}
.mod::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;background:radial-gradient(circle at 50% 0%,rgba(59,130,246,.1) 0%,transparent 70%)}
.mod:hover::before,.mod:active::before{opacity:1}
.mod:active{transform:scale(.97)}
.mod:nth-child(1){animation-delay:.12s}.mod:nth-child(2){animation-delay:.16s}.mod:nth-child(3){animation-delay:.2s}.mod:nth-child(4){animation-delay:.24s}.mod:nth-child(5){animation-delay:.28s}.mod:nth-child(6){animation-delay:.32s}.mod:nth-child(7){animation-delay:.36s}.mod:nth-child(8){animation-delay:.4s}.mod:nth-child(9){animation-delay:.44s}.mod:nth-child(10){animation-delay:.48s}.mod:nth-child(11){animation-delay:.52s}.mod:nth-child(12){animation-delay:.56s}
.mod-em{font-size:22px;display:block;margin-bottom:7px}
.mod h4{font-size:.81rem;font-weight:800;margin-bottom:2px}
.mod p{font-size:.68rem;color:var(--t3);line-height:1.4}
.mod-lv{position:absolute;top:9px;right:9px;font-size:.58rem;font-weight:700;font-family:var(--mono);padding:2px 6px;border-radius:4px}
.divl{height:1px;background:var(--b);margin:15px 0;position:relative}
.divl span{position:absolute;top:-8px;left:0;background:var(--bg);padding:0 8px;font-size:.65rem;color:var(--t3);font-family:var(--mono);letter-spacing:.08em}

/* CHIP */
.chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.67rem;font-weight:600;font-family:var(--mono);margin:2px}
.c-bl{background:rgba(59,130,246,.15);color:var(--bl)}.c-gr{background:rgba(16,185,129,.15);color:var(--green)}
.c-am{background:rgba(245,158,11,.15);color:var(--amber)}.c-pu{background:rgba(139,92,246,.15);color:var(--purple)}
.c-cy{background:rgba(34,211,238,.15);color:var(--cyan)}.c-or{background:rgba(249,115,22,.15);color:var(--orange)}
.c-te{background:rgba(20,184,166,.15);color:var(--teal)}.c-re{background:rgba(239,68,68,.15);color:var(--red)}

/* FLASHCARD */
.fc-decks{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.fc-decks::-webkit-scrollbar{display:none}
.fcd-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--b);background:var(--s2);font-size:.74rem;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .2s;color:var(--t2);font-family:var(--font);flex-shrink:0}
.fcd-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.fc-wrap{perspective:1200px;cursor:pointer;margin:0 0 11px}
.fc{width:100%;min-height:185px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.fc.flip{transform:rotateY(180deg)}
.fc-f,.fc-b{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--s1);border:1px solid var(--b);border-radius:var(--r);padding:20px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.fc-b{transform:rotateY(180deg);border-color:var(--b2)}
.fc-lbl{font-size:.62rem;font-weight:700;letter-spacing:.1em;color:var(--t3);margin-bottom:9px;font-family:var(--mono)}
.fc-q{font-size:.93rem;font-weight:700;line-height:1.5}
.fc-a{font-size:.8rem;line-height:1.75;color:var(--t2)}
.fc-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.fc-no{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--r2);padding:10px;color:var(--red);font-weight:700;cursor:pointer;font-family:var(--font);font-size:.8rem;transition:all .2s}
.fc-yes{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:var(--r2);padding:10px;color:var(--green);font-weight:700;cursor:pointer;font-family:var(--font);font-size:.8rem;transition:all .2s}
.fc-no:active{background:rgba(239,68,68,.2)}.fc-yes:active{background:rgba(16,185,129,.2)}

/* TERMINAL */
#term-wrap{background:#000;border:1px solid var(--b);border-radius:var(--r);overflow:hidden;height:380px;display:flex;flex-direction:column}
.term-bar{display:flex;align-items:center;gap:5px;padding:7px 11px;background:#0a0a0a;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.tdot{width:9px;height:9px;border-radius:50%}
.term-out{flex:1;overflow-y:auto;padding:9px 11px;font-family:var(--mono);font-size:.73rem;line-height:1.7;color:#e2e8f0}
.term-out::-webkit-scrollbar{width:3px}
.term-out::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.tl{margin-bottom:2px}
.tl.cmd{color:var(--green)}.tl.out{color:#a0aec0}.tl.err{color:var(--red)}.tl.info{color:var(--cyan)}.tl.warn{color:var(--amber)}
.term-in-row{display:flex;align-items:center;gap:7px;padding:7px 11px;border-top:1px solid #1a1a1a;background:#050505;flex-shrink:0}
.tprompt{color:var(--green);font-family:var(--mono);font-size:.73rem;white-space:nowrap}
#tinput{flex:1;background:transparent;border:none;outline:none;color:#e2e8f0;font-family:var(--mono);font-size:.73rem;caret-color:var(--green)}

/* AI CHAT */
#ai-wrap{display:flex;flex-direction:column;height:calc(100vh - 128px);gap:11px}
#ai-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:9px;background:var(--s1);border:1px solid var(--b);border-radius:var(--r);padding:15px}
#ai-msgs::-webkit-scrollbar{width:3px}
#ai-msgs::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
.ai-msg{max-width:88%;padding:11px 13px;border-radius:12px;font-size:.81rem;line-height:1.75;animation:vIn .28s cubic-bezier(.34,1.56,.64,1)}
.ai-msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--bd),var(--blue));color:#fff;border-radius:12px 12px 3px 12px}
.ai-msg.bot{align-self:flex-start;background:var(--s3);border:1px solid var(--b);border-radius:12px 12px 12px 3px}
.bot-lbl{font-size:.62rem;font-weight:700;letter-spacing:.1em;color:var(--blue);margin-bottom:5px;font-family:var(--mono)}
.ai-msg pre{background:#020508;border:1px solid var(--b);border-radius:7px;padding:9px;margin-top:7px;font-family:var(--mono);font-size:.71rem;overflow-x:auto;white-space:pre-wrap;color:#7dd3fc;line-height:1.6}
.ai-msg code{background:rgba(59,130,246,.1);padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:.78em;color:var(--bl)}
.ai-msg strong{color:#fff}
.ai-typing{align-self:flex-start;background:var(--s3);border:1px solid var(--b);border-radius:12px 12px 12px 3px;padding:11px 15px}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--t3);margin:0 2px;animation:dot .8s infinite}
.dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
@keyframes dot{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}
#ai-bottom{display:flex;gap:7px}
